@if (modal.state().visible) {
  <div class="fixed inset-0 z-[9999] flex items-center justify-center p-4" (click)="onOverlayClick($event)">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50 animate-fade-in"></div>

    <!-- Modal -->
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-sm animate-scale-in">

      <!-- Icono -->
      <div class="flex justify-center pt-6">
        @switch (modal.state().type) {
          @case ('success') {
            <div class="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center">
              <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          }
          @case ('error') {
            <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center">
              <svg class="w-7 h-7 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </div>
          }
          @case ('confirm') {
            <div class="w-14 h-14 rounded-full bg-primary-100 flex items-center justify-center">
              <svg class="w-7 h-7 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          }
          @default {
            <div class="w-14 h-14 rounded-full bg-primary-100 flex items-center justify-center">
              <svg class="w-7 h-7 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
          }
        }
      </div>

      <!-- Contenido -->
      <div class="px-6 pt-4 pb-2 text-center">
        <h3 class="text-lg font-bold text-gray-900">{{ modal.state().title }}</h3>
        <p class="mt-2 text-sm text-gray-600 leading-relaxed">{{ modal.state().message }}</p>
      </div>

      <!-- Botones -->
      <div class="px-6 pb-6 pt-4">
        @if (modal.state().type === 'confirm') {
          <div class="flex gap-3">
            <button
              (click)="modal.close(false)"
              class="flex-1 px-4 py-2.5 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
              {{ modal.state().cancelText }}
            </button>
            <button
              (click)="modal.close(true)"
              class="flex-1 px-4 py-2.5 bg-primary-600 text-white rounded-lg text-sm font-medium hover:bg-primary-700 transition">
              {{ modal.state().confirmText }}
            </button>
          </div>
        } @else {
          <button
            (click)="modal.close(true)"
            class="w-full px-4 py-2.5 rounded-lg text-sm font-medium transition"
            [class]="getButtonClass()">
            {{ modal.state().confirmText }}
          </button>
        }
      </div>
    </div>
  </div>
}
