<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <div><h1 class="text-2xl font-bold">Colores</h1><nav class="text-sm text-gray-500 mt-1"><a routerLink="/admin/productos" class="hover:underline">Admin</a> / Colores</nav></div>
    <button (click)="openCreate()" class="px-4 py-2 bg-primary-700 text-white rounded-lg text-sm">+ Nuevo Color</button>
  </div>
  @if (message()) { <div class="bg-primary-50 border border-primary-200 text-primary-700 px-4 py-2 rounded mb-4 text-sm">{{ message() }}</div> }
  <div class="bg-white rounded-lg shadow overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">Color</th><th class="px-4 py-3 text-left">Nombre</th><th class="px-4 py-3 text-left">Hex</th><th class="px-4 py-3 text-right">Acciones</th></tr></thead>
      <tbody>
        @for (item of colores(); track item.id) {
          <tr class="border-t">
            <td class="px-4 py-3"><div [style.background-color]="item.codigo_hex" class="w-8 h-8 rounded-full border border-gray-200"></div></td>
            <td class="px-4 py-3">{{ item.nombre }}</td>
            <td class="px-4 py-3 text-gray-500">{{ item.codigo_hex }}</td>
            <td class="px-4 py-3 text-right space-x-2"><button (click)="openEdit(item)" class="text-primary-600 hover:underline text-sm">Editar</button><button (click)="delete(item.id)" class="text-red-600 hover:underline text-sm">Eliminar</button></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
  @if (showModal()) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h2 class="text-lg font-bold mb-4">{{ editingId() ? 'Editar' : 'Nuevo' }} Color</h2>
        <div class="space-y-3">
          <div><label class="block text-sm font-medium mb-1">Nombre</label><input [(ngModel)]="form.nombre" class="w-full px-3 py-2 border rounded-lg text-sm" /></div>
          <div><label class="block text-sm font-medium mb-1">Color</label><div class="flex gap-2"><input type="color" [(ngModel)]="form.codigo_hex" class="w-12 h-10 border rounded cursor-pointer" /><input [(ngModel)]="form.codigo_hex" class="flex-1 px-3 py-2 border rounded-lg text-sm" /></div></div>
        </div>
        <div class="flex justify-end gap-3 mt-4"><button (click)="showModal.set(false)" class="px-4 py-2 border rounded-lg text-sm">Cancelar</button><button (click)="save()" class="px-4 py-2 bg-primary-700 text-white rounded-lg text-sm">Guardar</button></div>
      </div>
    </div>
  }
</div>
