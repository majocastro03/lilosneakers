<div class="min-h-screen bg-gray-100 flex">
  <!-- Mobile sidebar backdrop -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-black/50 z-40 lg:hidden" (click)="closeSidebar()"></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-50 w-64 bg-gray-900 text-white transform transition-transform duration-200 ease-in-out lg:translate-x-0 lg:static lg:z-auto"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <!-- Sidebar header -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-800">
      <img src="/assets/logo.png" alt="Lilo Sneakers" class="w-9 h-9 rounded-full object-cover" />
      <div>
        <h1 class="text-sm font-bold tracking-wide">LILO SNEAKERS</h1>
        <p class="text-[10px] text-gray-400">Panel de Administración</p>
      </div>
      <!-- Close button (mobile) -->
      <button (click)="closeSidebar()" class="ml-auto lg:hidden text-gray-400 hover:text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="px-3 py-4 space-y-1">
      <a routerLink="/admin/productos" routerLinkActive="bg-primary-600 text-white"
         [routerLinkActiveOptions]="{exact: true}"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Productos
      </a>

      <a routerLink="/admin/categorias" routerLinkActive="bg-primary-600 text-white"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
        </svg>
        Categorías
      </a>

      <a routerLink="/admin/marcas" routerLinkActive="bg-primary-600 text-white"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
        </svg>
        Marcas
      </a>

      <a routerLink="/admin/colores" routerLinkActive="bg-primary-600 text-white"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/>
        </svg>
        Colores
      </a>

      <a routerLink="/admin/tallas" routerLinkActive="bg-primary-600 text-white"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/>
        </svg>
        Tallas
      </a>

      <a routerLink="/admin/ordenes" routerLinkActive="bg-primary-600 text-white"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-300 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
        </svg>
        Órdenes
      </a>
    </nav>

    <!-- Sidebar footer -->
    <div class="absolute bottom-0 left-0 right-0 px-3 py-4 border-t border-gray-800 space-y-1">
      <a routerLink="/" class="flex items-center gap-3 px-3 py-2.5 text-sm text-gray-400 rounded-lg hover:bg-gray-800 hover:text-white transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
        Ver tienda
      </a>
      <button (click)="logout()" class="flex items-center gap-3 px-3 py-2.5 text-sm text-red-400 rounded-lg hover:bg-gray-800 hover:text-red-300 transition-colors w-full">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Main content area -->
  <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
    <!-- Top bar -->
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-30">
      <div class="flex items-center justify-between px-4 py-3">
        <!-- Left: hamburger + title -->
        <div class="flex items-center gap-3">
          <button (click)="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-gray-900">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h2 class="text-lg font-semibold text-gray-800 hidden sm:block">Panel de Administración</h2>
        </div>

        <!-- Right: user avatar with dropdown -->
        <div class="relative">
          <button (click)="toggleUserMenu()" class="flex items-center gap-2.5 cursor-pointer">
            <div class="w-9 h-9 rounded-full bg-red-500 flex items-center justify-center text-white text-sm font-bold">
              {{ userInitials }}
            </div>
            <span class="text-sm font-medium text-gray-700 hidden sm:block">{{ currentUser?.nombre || currentUser?.username }}</span>
          </button>

          @if (showUserMenu()) {
            <div class="fixed inset-0 z-40" (click)="showUserMenu.set(false)"></div>
            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1 z-50">
              <div class="px-4 py-2 border-b border-gray-100">
                <p class="text-sm font-medium text-gray-900">{{ currentUser?.nombre }}</p>
                <p class="text-xs text-gray-500">{{ currentUser?.email }}</p>
              </div>
              <a routerLink="/" (click)="showUserMenu.set(false)" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                Ver tienda
              </a>
              <button (click)="showUserMenu.set(false); logout()" class="flex items-center gap-2 w-full px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Cerrar sesión
              </button>
            </div>
          }
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="flex-1 p-4 sm:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
