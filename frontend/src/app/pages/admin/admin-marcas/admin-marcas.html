<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Marcas</h1>
      <nav class="text-sm text-gray-500 mt-1"><a routerLink="/admin/productos" class="hover:underline">Admin</a> / Marcas</nav>
    </div>
    <button (click)="openCreate()" class="px-4 py-2 bg-black text-white rounded-lg hover:bg-gray-800 text-sm">+ Nueva Marca</button>
  </div>
  @if (message()) { <div class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-2 rounded mb-4 text-sm">{{ message() }}</div> }
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-left">Nombre</th><th class="px-4 py-3 text-left">Slug</th><th class="px-4 py-3 text-right">Acciones</th></tr></thead>
      <tbody>
        @for (item of marcas(); track item.id) {
          <tr class="border-t"><td class="px-4 py-3">{{ item.nombre }}</td><td class="px-4 py-3 text-gray-500">{{ item.slug }}</td><td class="px-4 py-3 text-right space-x-2"><button (click)="openEdit(item)" class="text-blue-600 hover:underline text-sm">Editar</button><button (click)="delete(item.id)" class="text-red-600 hover:underline text-sm">Desactivar</button></td></tr>
        }
      </tbody>
    </table>
  </div>
  @if (showModal()) {
    <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h2 class="text-lg font-bold mb-4">{{ editingId() ? 'Editar' : 'Nueva' }} Marca</h2>
        <div class="space-y-3">
          <div><label class="block text-sm font-medium mb-1">Nombre</label><input [(ngModel)]="form.nombre" (input)="generateSlug()" class="w-full px-3 py-2 border rounded-lg text-sm" /></div>
          <div><label class="block text-sm font-medium mb-1">Slug</label><input [(ngModel)]="form.slug" class="w-full px-3 py-2 border rounded-lg text-sm" /></div>
          <div><label class="block text-sm font-medium mb-1">Descripción</label><textarea [(ngModel)]="form.descripcion" class="w-full px-3 py-2 border rounded-lg text-sm" rows="2"></textarea></div>
        </div>
        <div class="flex justify-end gap-3 mt-4"><button (click)="showModal.set(false)" class="px-4 py-2 border rounded-lg text-sm">Cancelar</button><button (click)="save()" class="px-4 py-2 bg-black text-white rounded-lg text-sm">Guardar</button></div>
      </div>
    </div>
  }
</div>
